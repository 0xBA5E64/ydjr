[package]
name = "ydjr"
version = "0.1.0"
edition = "2021"

[dependencies]
clap = { version = "4.6.0", features = ["derive"] }
matroska = "0.30.0"
serde_json = "1.0.149"
sqlx = { version = "0.8.6", features = ["sqlite", "migrate", "runtime-tokio"] }
thiserror = "2.0.18"
tokio = { version = "1.51.1", features = ["full"] }
walkdir = "2.5.0"
